{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <title>Band trainer</title>
  <link rel="stylesheet" href="{% static 'player/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'player/css/index.css' %}">
</head>
<body>
  <div class="aspect-overlay" id="aspectOverlay">
    <h2>Please rotate or resize!</h2>
    <p>Make your window wider, or rotate your phone into landscape orientation to use this app.</p>
  </div>

  <div class="Box" id="InnerBox">
    <h2 class="AnswerIndicator" id="AnswerIndicator">Bandwidth hearing test</h2>
    <h3 class="TaskDescription">Select which sample sounds better</h3>
    <h3 class="status" id="status">READY</h3>
        <ul class="radioList">
            <li class="radioLi">
                <input type="radio" id="X" name="X" value="ref">
                <label for="X">X</label>
            </li>
            <li class="radioLi">
                <input type="radio" id="A" name="A" value="">
                <label for="A">A</label>
            </li>
            <li class="radioLi">
                <input type="radio" id="B" name="B" value="">
                <label for="B">B</label>
            </li>
        </ul>

    <div class="bottom-controls">
      <button type="button" id="PlayStopBtn" class="PlayStopBtn">Play</button>
      <div class="file-selector-group">
        <select class="file-selector" id="fileSelector">
          <option value="Gray_noise.wav" selected>Gray_noise.wav</option>
          <option value="sample.wav">sample.wav</option>
        </select>
        <p class="file-selector-desc">audio source</p>
      </div>
      <button type="button" id="SubmitNextBtn" class="SubmitNextBtn">Submit answer</button>
    </div>
  </div>

  <script>
    // === DOM REFERENCES ===
    const AnsIndicator  = document.getElementById('AnswerIndicator');
    const PlayStopBtn   = document.getElementById('PlayStopBtn');
    const XAB           = document.getElemntByType('radio');
    const SubmitNextBtn = document.getElementById('SubmitNextBtn');
    const InnerBox      = document.getElementById('InnerBox');
    const statusEl      = document.getElementById('status');
    const fileSelector  = document.getElementById('fileSelector');

    let audioCtx;
    let audioBuffer = null;
    let audioBufferRef = null;
    let currentSource = null;
    
    const bandfilterPairs = [(0,44000),(50, 18000),(70, 16000),(90,14000),(110,12000),(140,10000),(200,8000),(250,6500)]; // pary dla filtra z OJD lab 1

    // Load audio from Django once per selector change
    async function loadAudioFile(filename) {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (currentSource){
            currentSource.stop();
        }

        const url = `/audio/?file=${encodeURIComponent(filename)}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Failed to load audio: ' + resp.statusText);
        const arrayBuffer = await resp.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioBufferRef = audioBuffer;
    }   

        fileSelector.addEventListener('change', (e) => {
            loadAudioFile(e.target.value).catch(err => {
                setStatus('ERROR: ' + err.message, 'error');
            });
        });
    
        // Initial load
        loadAudioFile(fileSelector.value).catch(err => {
            setStatus('ERROR: ' + err.message, 'error');
        });

    function CreateNewBandwidthTest() {
        if (!audioBuffer) {
            setStatus('Audio not loaded yet, please wait...', 'error');
            return;
        }
        // Randomly select a bandwidth from the pairs
        const randomIndex = Math.floor(Math.random() * bandfilterPairs.length);
        const [lowFreq, highFreq] = bandfilterPairs[randomIndex];
        
        const source = audioCtx.createBufferSource(buffer=audioBuffer);
        const bandpass = audioCtx.createBiquadFilter(type='bandpass', frequency=(lowFreq + highFreq) / 2, Q=(highFreq - lowFreq) / (lowFreq + highFreq)); // https://developer.mozilla.org/en-US/docs/Web/API/BiquadFilterNode
        source.connect(bandpass).connect(audioCtx.destination);
    }
    
    function playSample(){

    }

    // === SUBMIT ===
    function submit() {
      stopPlayback();

      if (XAB == null) {
        // Warning – yellow
        AnsIndicator.textContent   = "You must select an answer before submitting.";
        AnsIndicator.style.color   = "";              // keep default text color
        InnerBox.style.borderColor = "#d4b800";
        InnerBox.style.background  = "rgba(212,184,0,0.10)";
        SubmitNextBtn.addEventListener('click', submit, { once: true });
        return;
      }

      if (XAB  == targetFreq.toString() + "Hz") {
        //Correct – green
        AnsIndicator.textContent   = "Correct Answer!";
        AnsIndicator.style.color   = "var(--accent2)"; // use CSS variable for consistency 
        InnerBox.style.borderColor = "var(--accent2)";
        InnerBox.style.background  = "rgba(129,244,149,0.10)";
        statusEl.style.color       = "var(--accent2)";
      } else {
        //Wrong - red
        AnsIndicator.textContent   = "Incorrect Answer :(, the correct frequency was: "+targetFreq+"Hz";
        AnsIndicator.style.color   = "var(--wrong-light)";       
        InnerBox.style.borderColor = "var(--wrong-hard)";       
        InnerBox.style.background  = "rgba(255,111,89,0.10)";
        statusEl.style.color       = "var(--wrong-light)";       
      }

      //Disable radios
      XAB.forEach(function(radio) { radio.disabled = true; });

      SubmitNextBtn.textContent = "Next";
      SubmitNextBtn.addEventListener('click', next, { once: true });
    }

    function next() {
      // Re-enable radios
      XAB.forEach(function(radio) { radio.disabled = false; });
      // Reset answer indicator
      AnsIndicator.textContent = "Submit Answer";
      AnsIndicator.style.color = "";               // back to CSS default
      // Uncheck any selected radio
      const checked = document.querySelector('input[name="freq"]:checked');
      if (checked) checked.checked = false;
      // Reset button label
      SubmitNextBtn.textContent = "Submit";
      SubmitNextBtn.addEventListener('click', submit, { once: true });
      // CHANGE 9: Reset box border/bg to CSS defaults
      InnerBox.style.borderColor = "";
      InnerBox.style.background  = "";
      // Reset status color to default (var(--accent3))
      statusEl.style.color = "";
      XAB = null;
    }

    // Attach initial submit listener
    SubmitNextBtn.addEventListener('click', submit, { once: true });

    // === STATUS HELPER ===
    function setStatus(msg, cls = '') {
      statusEl.textContent = msg;
      // Preserve any inline color override; only touch className
      statusEl.className   = 'status ' + cls;
    }

    // === STOP PLAYBACK ===
    function stopPlayback() {
      if (audio) {
        audio.pause();
        audio.src = '';
        audio = null;
      }
      PlayStopBtn.textContent = "Play";
      PlayStopBtn.classList.remove('playing');
      setStatus('READY');
    }

    // === PLAY / STOP ===
    PlayStopBtn.addEventListener('click', async () => {
      if (currentSource){
            currentSource.stop();
        }
        if (!audioBuffer) {
            setStatus('Audio not loaded yet, please wait...', 'error');
            return;
        }
    });
  </script>
</body>
</html>
