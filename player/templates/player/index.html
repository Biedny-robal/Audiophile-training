<!DOCTYPE html>
<html lang="en">
<style>

  --red-hard: #ba0c00;
  --red-light: #ff6d63;
  --yellow-hard: #fce700;
  --yellow-light: #fff47d;
  --green-hard: #00ff22;
  --green-light: #8fff9e;
}
.Box{
  align-items: center;
  border: 10px solid beige;
}

</style>

<div class="Testing" hidden=true>
 <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
  <label for="vehicle1"> I have a bike</label><br>
  <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
  <label for="vehicle2"> I have a car</label><br>
  <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
  <label for="vehicle3"> I have a boat</label><br>
  <menu>
    <li>Coffee</li>
    <li>Tea</li>
    <li>Milk</li>
  </menu>
  <label for="cars">Choose a car:</label>

  <select id="cars">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>

  </select>
  <input type="radio" id="html" name="fav_language" value="HTML">
  <label for="html">HTML</label><br>

  <input type="radio" id="javascript" name="fav_language" value="JavaScript">
  <label for="javascript">JavaScript</label>
</div>


<div class="Box" id="InnerBox">
  <h2 class="AnswerIndicator" id="AnswerIndicator">Submit answer</h2>
  <button type="button" id="PlayStopBtn" class="PlayStopBtn">Play</button>
  <select class="file-selector" id="fileSelector">
    <option value="Gray_noise.wav" selected>Gray_noise.wav</option>
    <option value="sample.wav">sample.wav</option>
  </select>
  <h3 class="status" id="status">ready</h3>
  <h3 class="TaskDescription">Select which band has been changed</h3>
  <input type="radio" id="60" name="freq" value="60Hz">
  <label for="60">60Hz</label><br>
  <input type="radio" id="125" name="freq" value="125Hz">
  <label for="125">125Hz</label><br>
  <input type="radio" id="250" name="freq" value="250Hz">
  <label for="250">250Hz</label><br>
  <input type="radio" id="500" name="freq" value="500Hz">
  <label for="500">500Hz</label><br>
  <input type="radio" id="1000" name="freq" value="1000Hz">
  <label for="1000">1kHz</label><br>
  <input type="radio" id="2000" name="freq" value="2000Hz">
  <label for="2000">2kHz</label><br>
  <input type="radio" id="4000" name="freq" value="4000Hz">
  <label for="4000">4kHz</label><br>
  <input type="radio" id="8000" name="freq" value="8000Hz">
  <label for="8000">8kHz</label><br>
  <input type="radio" id="16000" name="freq" value="16000Hz">
  <label for="125">16kHz</label><br>
  <button type="button" id="SubmitNextBtn" class="SubmitNextBtn">Submit</button>
</div>

<script>
  // STATE
  let audio = null;
  var freq = null;
  let freqValues=new Map();
  freqValues.set("0",60);
  freqValues.set("1",125);
  freqValues.set("2",250);
  freqValues.set("3",500);
  freqValues.set("4",1000);
  freqValues.set("5",2000);
  freqValues.set("6",4000);
  freqValues.set("7",8000);
  freqValues.set("8",16000);
  // DOM referals
  const AnsIndicator = document.getElementById('AnswerIndicator');
  const PlayStopBtn = document.getElementById('PlayStopBtn');
  var freqs = document.querySelectorAll('input[name="freq"]');
  const SubmitNextBtn = document.getElementById('SubmitNextBtn');
  const InnerBox = document.getElementById('InnerBox');
  const statusEl = document.getElementById('status');
  var targetFreq = freqValues.get(newFreq());
  console.log(targetFreq);

  //Reading selected frequency
  freqs.forEach(function(radio) {
    radio.addEventListener('change', function() {
      freq = document.querySelector('input[name="freq"]:checked').value;
      console.log(freq);
    })
  });

  //selecting random frequency
  function newFreq(){
    return Math.floor(Math.random() * 9).toString();
  }

  // SubmitNextBtn
  function submit() {
    stopPlayback();
    if(freq==null){
      AnsIndicator.textContent="You Must Select a fequency before submitting.";
      InnerBox.style.border="10px solid #fce700";
      InnerBox.style.background="#fff47d";
      SubmitNextBtn.addEventListener('click', submit, {once: true});
      return;
    } else if(freq==targetFreq.toString()+"Hz"){
      AnsIndicator.textContent="Correct Answer!";
      InnerBox.style.border="10px solid #00ff22";
      InnerBox.style.background="#8fff9e";
    } else {
      AnsIndicator.textContent="Incorrect Answer :(, correct answer was: "+targetFreq.toString();
      InnerBox.style.border="10px solid #ba0c00";
      InnerBox.style.background="#ff6d63";
    }
    freqs.forEach(function(radio) {
      radio.disabled=true;
    });
    SubmitNextBtn.textContent="Next";
    SubmitNextBtn.addEventListener('click', next, {once: true});
    return;
  }

  function next() {
    freqs.forEach(function(radio) {
      radio.disabled=false;
    });
    AnsIndicator.textContent="Submit Answer";
    document.querySelector('input[name="freq"]:checked').checked = false;
    SubmitNextBtn.textContent="Submit";
    SubmitNextBtn.addEventListener('click', submit, {once: true});
    InnerBox.style.border="10px solid #f5f5dc";
    InnerBox.style.background="#ffffff";
    freq=null;
    targetFreq = freqValues.get(newFreq());
    console.log(targetFreq);
    return;
  }
  
  SubmitNextBtn.addEventListener('click', submit, {once: true});
  
  function setStatus(msg, cls='') {
    statusEl.textContent = msg;
    statusEl.className   = 'status ' + cls;
  }

  function stopPlayback() {
    if (audio) {
      audio.pause();
      audio.src = '';
      audio = null;
    }
    PlayStopBtn.textContent = "Play";
    PlayStopBtn.classList.remove('playing');
    //btnPlay.textContent = '▶';
    //btnPlay.classList.remove('playing');
    setStatus('READY');
  }

  PlayStopBtn.addEventListener('click', async () => {
    if (audio && !audio.paused) {
      stopPlayback();
      return;
    }

    // Stop any leftover audio
    stopPlayback();

    setStatus('PROCESSING…', 'loading');
    PlayStopBtn.disabled = true;

    try {
      // Fetch the EQ-processed audio from Django
      const selectedFile = fileSelector.value;
      const url = `/audio/?freq=${targetFreq}&file=${encodeURIComponent(selectedFile)}`;
      const resp = await fetch(url);

      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(err);
      }

      const blob = await resp.blob();
      const blobUrl = URL.createObjectURL(blob);

      audio = new Audio(blobUrl);

      audio.addEventListener('ended', stopPlayback);
      audio.addEventListener('error', () => {
        setStatus('PLAYBACK ERROR', 'error');
        stopPlayback();
      });

      await audio.play();

      PlayStopBtn.textContent = "Stop";
      PlayStopBtn.classList.add('playing');
      setStatus('PLAYING');
    } catch (err) {
      setStatus('ERROR: ' + err.message, 'error');
      stopPlayback();
    } finally {
      PlayStopBtn.disabled = false;
    }
  });

</script>
